name: CI

on:
  push:
    branches: [master, "claude/**"]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Test (JDK 21)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: sbt

      - name: Set up sbt
        uses: sbt/setup-sbt@v1

      - name: Check formatting
        run: sbt scalafmtCheckAll scalafmtSbtCheck

      - name: Run tests
        run: sbt test
